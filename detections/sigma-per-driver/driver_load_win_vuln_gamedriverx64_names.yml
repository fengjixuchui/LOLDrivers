title: Driver Load - GameDriverX64.sys
id: 32a822a4-bd85-5227-902d-e3d2944053e2
status: experimental
description: |
    Detects loading of driver GameDriverX64.sys via name.
    GameDriverX64.sys is a signed Hotta Studio anti-cheat driver affected by CVE-2025-61155. Its device-access and IOCTL checks rely on spoofable module names, process names, PE checksums, and the hardcoded value 0xFA123456. A local user can reach kernel routines that terminate arbitrary processes, register a process for handle protection, and strip existing handle rights. KSophon_x64.sys is the VMProtect-packed predecessor shipped with Tower of Fantasy; public reverse engineering reports that it retains the same weak authentication and IOCTL capabilities. The tracked files are legitimate vendor-signed drivers, not malicious drivers, although GameDriverX64.sys has been abused for defense evasion in ransomware intrusions.
references:
    - https://www.loldrivers.io/drivers/271ace20-2f68-4695-9579-0d4de8cb4fe6/
    - https://www.security.com/blog-post/dragonforce-msteams-backdoor
    - https://github.com/magicsword-io/LOLDrivers/issues/360
    - https://github.com/magicsword-io/LOLDrivers/issues/362
    - https://github.com/BlackSnufkin/BYOVD/tree/main/GameDriverX64-Killer
    - https://www.security.com/threat-intelligence/dragonforce-msteams-backdoor
    - https://nvd.nist.gov/vuln/detail/CVE-2025-61155
    - https://github.com/pollotherunner/CVE-2025-61155/blob/main/advisory.md
    - https://vespalec.com/blog/tower-of-flaws/
    - https://github.com/svespalec/TowerOfFlaws
author: Michael Haag

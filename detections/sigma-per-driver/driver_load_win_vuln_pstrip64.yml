title: Driver Load - pstrip64.sys
id: 638b9e2b-ef18-50ec-b0ba-1167cfdaa391
status: experimental
description: |
    Detects loading of driver pstrip64.sys via hash.
    pstrip64.sys is the EnTech Taiwan PowerStrip x64 kernel-mode driver, signed by EnTech Taiwan. In PowerStrip version 3.90.736 and earlier, the driver's IOCTL dispatcher exposes code 0x80002008, which maps caller-supplied physical memory directly into the requesting user-mode process and returns the mapped virtual base address, giving a local user an arbitrary physical read/write primitive. Public exploitation of CVE-2026-29923 uses this to scan physical memory for the EPROCESS 'Proc' pool tag, copy the SYSTEM process token, and overwrite the caller's token to escalate to NT AUTHORITY\SYSTEM.
references:
    - https://www.loldrivers.io/drivers/1db2dd90-5b8e-43c3-a39b-61e0614fb2ab/
    - https://nvd.nist.gov/vuln/detail/CVE-2026-29923
    - https://github.com/athenasec16/CVE-2026-29923
author: Aryu-RU
